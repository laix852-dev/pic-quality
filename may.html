<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AIGC PIC 质检看板 · 五月</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1a1a2e; padding: 20px; min-width: 1140px; }

.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 22px 28px; border-radius: 14px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 22px; font-weight: 700; }
.header .meta { text-align: right; font-size: 12px; opacity: 0.7; }
.month-btn { padding: 5px 16px; border-radius: 6px; border: none; background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.month-btn.active { background: rgba(255,255,255,0.2); color: #fff; }
.month-btn:not([disabled]):hover { background: rgba(255,255,255,0.15); color: #fff; }

.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #fff; border-radius: 12px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.tab { flex: 1; padding: 10px 12px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: #8c8c9a; transition: all 0.2s; border: none; background: transparent; }
.tab:hover { color: #667eea; background: rgba(102,126,234,0.06); }
.tab.active { color: #fff; background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 2px 8px rgba(102,126,234,0.3); }
.tab .sub { font-size: 10px; opacity: 0.7; display: block; }

.stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 14px; }
.stat-card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border-left: 3px solid transparent; }
.stat-card.info { border-left-color: #1677ff; }
.stat-card.warn { border-left-color: #fa8c16; }
.stat-card.good { border-left-color: #52c41a; }
.stat-card.danger { border-left-color: #f5222d; }
.stat-card.purple { border-left-color: #722ed1; }
.stat-card .label { font-size: 11px; color: #8c8c9a; margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 700; }
.stat-card .sub { font-size: 10px; color: #8c8c9a; margin-top: 2px; }
.stat-card.good .value { color: #52c41a; }
.stat-card.warn .value { color: #fa8c16; }
.stat-card.info .value { color: #1677ff; }
.stat-card.danger .value { color: #f5222d; }
.stat-card.purple .value { color: #722ed1; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.full { grid-column: 1 / -1; }

.panel { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); overflow: hidden; }
.panel-header { padding: 12px 18px; border-bottom: 1px solid #f0f0f0; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.panel-header .dot { width: 7px; height: 7px; border-radius: 50%; }
.panel-body { padding: 12px 18px; }
.panel-body.no-padding { padding: 0; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #fafafa; padding: 8px 10px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
tr:hover td { background: #fafbff; }

.tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.tag-red { background: #fff1f0; color: #cf1322; }
.tag-orange { background: #fff7e6; color: #d46b08; }
.tag-green { background: #f6ffed; color: #389e0d; }
.tag-blue { background: #e6f4ff; color: #1677ff; }
.tag-purple { background: #f9f0ff; color: #722ed1; }

.rank-badge { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 10px; font-weight: 700; color: #fff; }
.rank-1 { background: linear-gradient(135deg, #f5af19, #f12711); }
.rank-2 { background: linear-gradient(135deg, #9e9e9e, #424242); }
.rank-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); }

.bar-cell { display: flex; align-items: center; gap: 8px; }
.bar-cell .bar-bg { flex: 1; height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
.bar-cell .bar-fill { height: 5px; border-radius: 3px; }
.bar-cell .pct-text { font-weight: 600; min-width: 44px; text-align: right; font-size: 11px; }

.chart-wrap { position: relative; height: 220px; }
.chart-wrap-sm { position: relative; height: 180px; }
.chart-wrap-xs { position: relative; height: 150px; }

.content-tab { display: none; }
.content-tab.active { display: block; }

.footer-note { text-align: center; color: #999; font-size: 11px; padding: 10px; }

.highlight { font-weight: 700; }
.up { color: #52c41a; }
.down { color: #f5222d; }
.muted { color: #999; font-size: 11px; }

.suggestion-block { margin-top: 14px; }
.suggestion-table td { font-size: 12.5px; padding: 9px 12px; }
.suggestion-table td:first-child { width: 32px; text-align: center; font-weight: 700; color: #667eea; }

.anomaly-row td { background: #fffbe6; }
.anomaly-row:hover td { background: #fff8c5; }
.improve-row td { background: #f6ffed; }
.decline-row td { background: #fff1f0; }

.alert-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
.alert-box .icon { font-size: 16px; flex-shrink: 0; }
.alert-box.red { background: #fff1f0; border-color: #ffccc7; }
.alert-box.green { background: #f6ffed; border-color: #b7eb8f; }

.insight-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.insight-card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.insight-card .ic-label { font-size: 11px; color: #8c8c9a; margin-bottom: 6px; }
.insight-card .ic-body { font-size: 13px; line-height: 1.6; }

.rank-full td:first-child { color: #999; font-size: 11px; text-align: center; width: 28px; }
.rank-full td:nth-child(6) { font-weight: 600; }

.note-small { font-size: 11px; color: #8c8c9a; margin-top: 6px; font-style: italic; }
</style>
</head>
<body>
<div id="login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);z-index:9999;display:flex;align-items:center;justify-content:center">
<div style="background:#fff;border-radius:14px;padding:40px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);min-width:340px">
<h2 style="margin-bottom:6px;font-size:20px">AIGC PIC 质检看板</h2>
<p style="color:#8c8c9a;font-size:13px;margin-bottom:24px">请输入访问密码</p>
<input id="pi" type="password" placeholder="请输入密码" autofocus style="width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;text-align:center;outline:none">
<button id="login-btn" style="width:100%;margin-top:14px;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">确 认</button>
<p id="pe" style="color:#f5222d;font-size:12px;margin-top:10px;display:none">密码错误，请重试</p>
</div></div>
<script>
try{
if(localStorage.getItem("pa")==="1"){document.getElementById("login-overlay").style.display="none"}
else{
document.getElementById("login-btn").onclick=function(){
if(document.getElementById("pi").value==="888888"){localStorage.setItem("pa","1");document.getElementById("login-overlay").style.display="none"}
else{document.getElementById("pe").style.display="block"}
};
document.getElementById("pi").onkeydown=function(e){if(e.key==="Enter")document.getElementById("login-btn").click()}
}
}catch(e){console.log(e)}
</script>


<script>
(function(){
  if(localStorage.getItem("pa")==="1"){document.getElementById("login-overlay").style.display="none";return}
  document.getElementById("login-btn").addEventListener("click",function(){
    if(document.getElementById("pi").value==="888888"){localStorage.setItem("pa","1");document.getElementById("login-overlay").style.display="none"}
    else{document.getElementById("pe").style.display="block"}
  });
  document.getElementById("pi").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("login-btn").click()});
})();
</script>

    if(document.getElementById("pi").value==="888888"){localStorage.setItem("pa","1");document.getElementById("login-overlay").style.display="none"}
    else{document.getElementById("pe").style.display="block"}
  });
  document.getElementById("pi").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("login-btn").click()});
})();
<\/script>
</body>
</html>
